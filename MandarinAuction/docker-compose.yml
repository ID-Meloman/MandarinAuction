version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mandarin_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-mydb}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mandarin_network
    restart: unless-stopped

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: mandarin_app
    ports:
      - "${APP_PORT:-5000}:80"
      - "${APP_SSL_PORT:-5001}:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST:-postgres};Port=${DB_PORT:-5432};Database=${DB_NAME:-mydb};Username=${DB_USER:-admin};Password=${DB_PASSWORD:-1234}
      - EmailSettings__SmtpServer=${SMTP_SERVER:-smtp.gmail.com}
      - EmailSettings__SmtpPort=${SMTP_PORT:-587}
      - EmailSettings__SmtpUser=${SMTP_USER}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD}
      - EmailSettings__FromEmail=${FROM_EMAIL}
      - EmailSettings__SiteUrl=${SITE_URL:-https://localhost:5000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mandarin_network
    volumes:
      - ./wwwroot/images:/app/wwwroot/images
      - ./email_log.txt:/app/email_log.txt
    restart: unless-stopped

networks:
  mandarin_network:
    driver: bridge

volumes:
  postgres_data: